<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brain drain · lexicon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Beastly&family=Inter:wght@400;500;600&family=Work+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../braindrain/braindrain.css?v=17">
  <link rel="stylesheet" href="../braindrain-mainline/braindrainmain.css?v=11">
  <link rel="stylesheet" href="lexicon.css?v=5">
</head>
<body>
  <header class="bd-header">
    <div class="wordmark">
      <svg class="rings" viewBox="0 0 200 200" aria-hidden="true">
        <path id="rings-spiral" fill="none" stroke="#4a0c1e" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <h1>brain drain</h1>
      <span class="wordmark-sub">the lexicon</span>
    </div>
  </header>

  <main class="bd-main archive-main">
    <div id="lexicon-container">
      <div id="lexicon-body">
        <p class="archive-empty">loading…</p>
      </div>
    </div>
    <div class="archive-bottom-bar">
      <a href="/braindrain?open=lex" class="link-btn bottom-link">+ fresh word</a>
      <button type="button" id="tidy-btn" class="link-btn bottom-link">− tidy</button>
    </div>
    <div class="folder-tabs folder-tabs-side folder-tabs-side-left">
      <a href="/braindrain-mainline" class="folder-tab folder-tab-side folder-tab-side-left">main line</a>
    </div>
  </main>

  <script>
    (() => {
      const path = document.getElementById('rings-spiral');
      if (!path) return;
      const cx = 100, cy = 100, maxR = 92, turns = 5, ptsPerTurn = 28;
      const total = turns * ptsPerTurn;
      let d = '';
      for (let i = 0; i <= total; i++) {
        const ratio = i / total;
        const angle = ratio * turns * 2 * Math.PI;
        const r = ratio * maxR;
        const x = (cx + r * Math.cos(angle)).toFixed(2);
        const y = (cy + r * Math.sin(angle)).toFixed(2);
        d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
      }
      path.setAttribute('d', d);
    })();
  </script>

  <script src="lexicon.js?v=6"></script>
</body>
</html>
