<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brain drain · main line</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Beastly&family=Inter:wght@400;500;600&family=Work+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../braindrain/braindrain.css?v=17">
  <link rel="stylesheet" href="braindrainmain.css?v=11">
</head>
<body>
  <header class="bd-header">
    <div class="wordmark">
      <svg class="rings" viewBox="0 0 200 200" aria-hidden="true">
        <path id="rings-spiral" fill="none" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <h1>brain drain</h1>
      <span class="wordmark-sub">the main line</span>
    </div>
  </header>

  <main class="bd-main archive-main">
    <div id="archive-container">
      <div class="archive-controls">
        <div class="control-wrap">
          <button type="button" id="sort-by-btn" class="link-btn">sort &gt;</button>
          <div id="sort-by-menu" class="sort-menu" hidden></div>
        </div>
        <button type="button" id="rethink-btn" class="link-btn">rethink &gt;</button>
      </div>
      <div id="archive-body">
        <p class="archive-empty">loading…</p>
      </div>
    </div>
    <div class="archive-bottom-bar">
      <a href="/braindrain" class="link-btn bottom-link">+ fresh thought</a>
      <div class="bottom-right-stack">
        <button type="button" id="download-btn" class="link-btn bottom-link">* download</button>
        <a id="sheet-link" class="bottom-sheet-link" href="#" target="_blank" rel="noopener" hidden>&gt; view sheet</a>
      </div>
    </div>
    <div class="folder-tabs folder-tabs-side">
      <a href="/braindrain-lexicon" class="folder-tab folder-tab-side">lexicon</a>
    </div>
  </main>

  <script>
    (() => {
      const path = document.getElementById('rings-spiral');
      if (!path) return;
      const cx = 100, cy = 100, maxR = 92, turns = 5, ptsPerTurn = 28;
      const total = turns * ptsPerTurn;
      let d = '';
      for (let i = 0; i <= total; i++) {
        const ratio = i / total;
        const angle = ratio * turns * 2 * Math.PI;
        const r = ratio * maxR;
        const x = (cx + r * Math.cos(angle)).toFixed(2);
        const y = (cy + r * Math.sin(angle)).toFixed(2);
        d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
      }
      path.setAttribute('d', d);
    })();

  </script>

  <img src="sewer-hunter.jpg" class="sewer-hunter" alt="" aria-hidden="true">

  <script src="braindrainmain.js?v=6"></script>
</body>
</html>
