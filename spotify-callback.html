<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spotify auth</title>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    .auth-box {
      max-width: 600px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
    .code {
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      word-break: break-all;
      background: #f4f3f0;
      padding: 12px;
      border-radius: 4px;
      margin: 16px 0;
      user-select: all;
    }
    button {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 16px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-transform: lowercase;
    }
    button:hover { background: #333; }
    .hint { color: #999; font-size: 0.85rem; margin-top: 16px; }
    .err { color: #a05a5a; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2>spotify auth code</h2>
    <p class="hint">copy this code and text it back to benson.</p>
    <div class="code" id="code">loading...</div>
    <button id="copy">copy code</button>
    <p class="hint" id="status"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const codeEl = document.getElementById('code');
    const copyBtn = document.getElementById('copy');
    const statusEl = document.getElementById('status');

    if (error) {
      codeEl.textContent = 'error: ' + error;
      codeEl.classList.add('err');
      copyBtn.style.display = 'none';
    } else if (code) {
      codeEl.textContent = code;
      copyBtn.addEventListener('click', async () => {
        await navigator.clipboard.writeText(code);
        statusEl.textContent = 'copied!';
      });
    } else {
      codeEl.textContent = 'no code in url';
      copyBtn.style.display = 'none';
    }
  </script>
</body>
</html>
