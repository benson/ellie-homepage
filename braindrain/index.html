<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brain drain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Beastly&family=Inter:wght@400;500;600&family=Work+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="braindrain.css?v=17">
</head>
<body>
  <header class="bd-header">
    <div class="wordmark">
      <svg class="rings" viewBox="0 0 200 200" aria-hidden="true">
        <path id="rings-spiral" fill="none" stroke="#4a0c1e" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <h1>brain drain</h1>
    </div>
  </header>

  <main class="bd-main">
    <p class="now-stamp" id="now-stamp"><span class="now-date" id="now-date"></span><span class="now-time" id="now-time"></span></p>
    <div class="stage">
      <div class="brain-frame">
        <img src="brain.jpg?v=4" class="brain" alt="" aria-hidden="true">

        <section id="compose-overlay" class="overlay">
          <div class="textbox-wrap">
            <textarea id="factoid-input" rows="4" autofocus autocapitalize="none" autocorrect="off"></textarea>
            <button type="button" id="pin-btn" class="pin-btn" aria-label="pin this thought">
              <svg class="clip" viewBox="0 0 24 24" aria-hidden="true">
                <g transform="rotate(35 12 12)">
                  <path d="M12 17v5" fill="none" stroke="#222" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z" fill="none" stroke="#222" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
              </svg>
              <span class="pin-count" id="pin-count" hidden>0</span>
            </button>
          </div>
        </section>

        <section id="review-overlay" class="overlay" hidden>
          <div class="review-card">
            <button type="button" id="card-delete-btn" class="card-delete" aria-label="discard this card">&times;</button>
            <div class="review-counter" id="review-counter" hidden></div>
            <div class="review-stamp" id="review-stamp"></div>
            <div class="review-text" id="review-text"></div>
            <div class="review-context" id="review-context" hidden></div>
          </div>
        </section>

        <section id="saved-overlay" class="overlay" hidden>
          <div class="textbox-wrap saved-card">
            <div class="saved-message">stay curious</div>
          </div>
        </section>
      </div>
    </div>

    <div class="actions">
      <div id="compose-actions" class="action-row">
        <div class="left-action" id="context-area">
          <button type="button" id="add-context-btn" class="link-btn">+ context</button>
        </div>
        <button type="button" id="review-btn" class="link-btn">review &gt;</button>
      </div>
      <div id="review-actions" class="action-row" hidden>
        <button type="button" id="edit-btn" class="link-btn">&lt; edit</button>
        <button type="button" id="prev-card-btn" class="link-btn" hidden>&lt; prev</button>
        <div class="sort-wrap">
          <button type="button" id="sort-btn" class="link-btn">+ sort</button>
          <div id="sort-menu" class="sort-menu" hidden></div>
        </div>
        <button type="button" id="next-card-btn" class="link-btn" hidden>next &gt;</button>
        <button type="button" id="enter-btn" class="link-btn">enter &gt;</button>
      </div>
      <div id="saved-actions" class="action-row saved-actions" hidden>
        <button type="button" id="new-thought-btn" class="link-btn">+ fresh thought</button>
      </div>
    </div>

    <a href="/braindrain-mainline" class="bottom-mainline">{ the main line }</a>

    <p id="status" class="bd-status" hidden></p>
  </main>

  <button type="button" id="book-btn" class="book-btn" aria-label="add a word to lexicon">
    <svg viewBox="0 0 24 24" aria-hidden="true" class="book-icon">
      <path d="M5 3h12a2 2 0 0 1 2 2v15a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2V5a2 2 0 0 1 1-2z" fill="none" stroke="#222" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 18h13" fill="none" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M8 7h7M8 10h5" fill="none" stroke="#222" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span id="book-resize" class="book-resize" role="button" aria-label="drag to resize">
      <svg viewBox="0 0 10 10" aria-hidden="true">
        <path d="M2 8 L8 2 M5 8 L8 8 L8 5 M2 5 L2 2 L5 2" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>

  <div id="lex-modal" class="lex-modal" hidden>
    <div class="lex-backdrop" id="lex-backdrop"></div>
    <div class="lex-card" role="dialog" aria-label="add a new word">
      <button type="button" id="lex-close" class="lex-close" aria-label="close">&times;</button>
      <div class="lex-title">fresh word</div>
      <input type="text" id="lex-input" class="lex-input" placeholder="feed me" autocapitalize="none" autocorrect="off" spellcheck="false"/>
      <div id="lex-preview" class="lex-preview" hidden></div>
      <div id="lex-status" class="lex-status" hidden></div>
      <div id="lex-manual" class="lex-manual" hidden>
        <div class="lex-manual-prompt" id="lex-manual-prompt"></div>
        <textarea id="lex-manual-input" class="lex-manual-input" rows="3" placeholder="what does it mean to you?" autocapitalize="sentences"></textarea>
        <div class="lex-manual-actions">
          <button type="button" id="lex-manual-save" class="link-btn">+ pin with this</button>
          <button type="button" id="lex-manual-skip" class="link-btn lex-skip">skip</button>
        </div>
      </div>
      <div class="lex-actions" id="lex-actions">
        <button type="button" id="lex-add" class="link-btn lex-add" aria-label="add another word">+</button>
        <span id="lex-queue-count" class="lex-queue-count" hidden></span>
        <button type="button" id="lex-enter" class="link-btn lex-enter" aria-label="enter all words">&gt;</button>
      </div>
    </div>
  </div>

  <script src="braindrain.js?v=21"></script>
</body>
</html>
